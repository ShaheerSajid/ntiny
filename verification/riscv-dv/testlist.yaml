# ntiny riscv-dv test list
# Covers: arithmetic, branches, load/store, compressed, hazards, MMU,
#         traps/exceptions, privilege modes, unaligned access.
#
# Note: num_of_sub_program=0 due to pygen/pyvsc callstack_gen bug on Python 3.12.
# Instruction counts are set high for good coverage.

# ── Arithmetic (no memory, no branches) ──────────────────────────────────────

- test: riscv_arithmetic_basic_test
  description: >
    Pure arithmetic: ADD, SUB, AND, OR, XOR, shifts, comparisons, MUL, DIV.
    No load/store/branch — validates ALU and MUL/DIV unit in isolation.
  iterations: 1
  gen_test: riscv_instr_base_test
  gen_opts: >
    +instr_cnt=500
    +num_of_sub_program=0
    +directed_instr_0=riscv_int_numeric_corner_stream,4
    +no_fence=1
    +no_data_page=1
    +no_branch_jump=1
    +boot_mode=m
    +no_csr_instr=1
  rtl_test: core_base_test

# ── Branches and jumps ──────────────────────────────────────────────────────

- test: riscv_jump_stress_test
  description: >
    Back-to-back JAL/JALR stress. Tests branch prediction, pipeline flush,
    and c_controller alignment on branch targets.
  iterations: 1
  gen_test: riscv_instr_base_test
  gen_opts: >
    +instr_cnt=500
    +num_of_sub_program=0
    +directed_instr_0=riscv_jal_instr,20
    +boot_mode=m
  rtl_test: core_base_test

- test: riscv_loop_test
  description: >
    Nested loops with mixed arithmetic and branches.
    Exercises branch prediction and loop-related hazards.
  iterations: 1
  gen_test: riscv_instr_base_test
  gen_opts: >
    +instr_cnt=500
    +num_of_sub_program=0
    +directed_instr_0=riscv_loop_instr,15
    +boot_mode=m
  rtl_test: core_base_test

# ── Load/Store and memory ───────────────────────────────────────────────────

- test: riscv_load_store_test
  description: >
    Random load/store patterns. Stress-tests forwarding, hazard detection,
    and the core2avl load/store unit.
  iterations: 1
  gen_test: riscv_instr_base_test
  gen_opts: >
    +instr_cnt=500
    +num_of_sub_program=0
    +directed_instr_0=riscv_load_store_rand_instr_stream,10
    +directed_instr_1=riscv_load_store_hazard_instr_stream,10
    +boot_mode=m
  rtl_test: core_base_test

- test: riscv_unaligned_load_store_test
  description: >
    Unaligned half-word and word loads/stores. Tests the core2avl misalign
    FSM that splits unaligned accesses into two bus transactions.
  iterations: 1
  gen_test: riscv_instr_base_test
  gcc_opts: >
    -mno-strict-align
  gen_opts: >
    +instr_cnt=500
    +num_of_sub_program=0
    +directed_instr_0=riscv_load_store_rand_instr_stream,15
    +directed_instr_1=riscv_load_store_hazard_instr_stream,10
    +enable_unaligned_load_store=1
    +boot_mode=m
  rtl_test: core_base_test

# ── Compressed instructions ─────────────────────────────────────────────────

- test: riscv_rand_instr_test
  description: >
    Full random instruction mix (RV32IMC). Exercises the c_controller
    alignment FSM with a mix of 16-bit and 32-bit instructions,
    including redirects landing on half-word boundaries.
  iterations: 1
  gen_test: riscv_instr_base_test
  gen_opts: >
    +instr_cnt=500
    +num_of_sub_program=0
    +directed_instr_0=riscv_load_store_rand_instr_stream,4
    +directed_instr_1=riscv_loop_instr,4
    +directed_instr_2=riscv_hazard_instr_stream,4
    +directed_instr_3=riscv_jal_instr,4
    +boot_mode=m
  rtl_test: core_base_test

- test: riscv_no_compressed_test
  description: >
    Random test with compressed instructions disabled.
    Validates 32-bit-only instruction stream through c_controller.
  iterations: 1
  gen_test: riscv_instr_base_test
  gen_opts: >
    +disable_compressed_instr=1
    +instr_cnt=500
    +num_of_sub_program=0
    +boot_mode=m
  rtl_test: core_base_test

# ── Pipeline hazards ────────────────────────────────────────────────────────

- test: riscv_hazard_test
  description: >
    RAW/WAW/WAR hazard sequences. Tests the forwarding network,
    stall_line bubble insertion, and load-use hazards.
  iterations: 1
  gen_test: riscv_instr_base_test
  gen_opts: >
    +instr_cnt=500
    +num_of_sub_program=0
    +directed_instr_0=riscv_hazard_instr_stream,20
    +directed_instr_1=riscv_load_store_hazard_instr_stream,15
    +boot_mode=m
  rtl_test: core_base_test

# ── Traps and exceptions ───────────────────────────────────────────────────

- test: riscv_illegal_instr_test
  description: >
    Illegal instruction injection. Tests that the core correctly traps
    on invalid encodings and resumes via the exception handler.
  iterations: 1
  gen_test: riscv_instr_base_test
  gen_opts: >
    +illegal_instr_ratio=5
    +instr_cnt=500
    +num_of_sub_program=0
    +boot_mode=m
  rtl_test: core_base_test

- test: riscv_ebreak_test
  description: >
    ebreak instruction test. Tests the interrupt_ctrl ecall/ebreak path
    and trap handler return.
  iterations: 1
  gen_test: riscv_instr_base_test
  gen_opts: >
    +instr_cnt=500
    +num_of_sub_program=0
    +no_ebreak=0
    +boot_mode=m
  rtl_test: core_base_test

- test: riscv_hint_instr_test
  description: >
    HINT instruction (C extension NOPs). Verifies the core treats
    them as NOPs without illegal instruction exceptions.
  iterations: 1
  gen_test: riscv_instr_base_test
  gen_opts: >
    +hint_instr_ratio=5
    +instr_cnt=500
    +num_of_sub_program=0
    +boot_mode=m
  rtl_test: core_base_test

# ── MMU stress ──────────────────────────────────────────────────────────────

- test: riscv_mmu_stress_test
  description: >
    Heavy load/store mix across multiple pages. Stress-tests ITLB/DTLB,
    the hardware page table walker, and TLB eviction.
  iterations: 1
  gen_test: riscv_instr_base_test
  gen_opts: >
    +instr_cnt=500
    +num_of_sub_program=0
    +directed_instr_0=riscv_load_store_rand_instr_stream,20
    +directed_instr_1=riscv_load_store_hazard_instr_stream,20
    +directed_instr_2=riscv_multi_page_load_store_instr_stream,10
    +directed_instr_3=riscv_mem_region_stress_test,10
    +boot_mode=m
  rtl_test: core_base_test

# ── No-fence (pipeline stress) ──────────────────────────────────────────────

- test: riscv_no_fence_test
  description: >
    Random instruction mix with FENCE disabled. Tests pipeline hazards
    without FENCE-induced stalls/flushes.
  iterations: 1
  gen_test: riscv_instr_base_test
  gen_opts: >
    +no_fence=1
    +instr_cnt=500
    +num_of_sub_program=0
    +boot_mode=m
  rtl_test: core_base_test

# ── Privilege mode / Sv32 (SRET bug target) ─────────────────────────────────

- test: riscv_umode_test
  description: >
    Boot to U-mode via MRET→SRET with Sv32 page tables.
    The riscv-dv framework sets up page tables, drops M→S→U.
    The SRET from S→U with a cold ITLB is the exact scenario
    that triggers the PC-latch deadlock (SRET ITLB stall bug).
  iterations: 1
  gen_test: riscv_instr_base_test
  gen_opts: >
    +instr_cnt=500
    +num_of_sub_program=0
    +boot_mode=u
  rtl_test: core_base_test

- test: riscv_smode_test
  description: >
    Boot to S-mode via MRET with Sv32. Tests S-mode execution,
    SFENCE.VMA, and basic supervisor trap handling.
  iterations: 1
  gen_test: riscv_instr_base_test
  gen_opts: >
    +instr_cnt=500
    +num_of_sub_program=0
    +boot_mode=s
  rtl_test: core_base_test

- test: riscv_umode_vm_stress_test
  description: >
    U-mode with heavy load/store — stresses DTLB/ITLB page walks
    through Sv32 translation in user mode after SRET.
  iterations: 1
  gen_test: riscv_instr_base_test
  gen_opts: >
    +instr_cnt=500
    +num_of_sub_program=0
    +boot_mode=u
    +directed_instr_0=riscv_load_store_rand_instr_stream,10
    +directed_instr_1=riscv_load_store_hazard_instr_stream,10
  rtl_test: core_base_test
