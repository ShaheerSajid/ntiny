[RISCOF]
ReferencePlugin=spike
ReferencePluginPath=./spike
DUTPlugin=ntiny
DUTPluginPath=./ntiny

[ntiny]
pluginpath=./ntiny
ispec=./ntiny/ntiny_isa_fpu.yaml
pspec=./ntiny/ntiny_platform.yaml
target_run=1
jobs=8
toolchain=/opt/riscv-elf/bin

[spike]
pluginpath=./spike
ispec=./ntiny/ntiny_isa_fpu.yaml
pspec=./ntiny/ntiny_platform.yaml
PATH=/opt/spike/bin
toolchain=/opt/riscv-elf/bin
jobs=8
